apiVersion: apps/v1
kind: Deployment
metadata:
  name: martech-api
  namespace: martech
  labels:
    app: martech-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: martech-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: martech-api
    spec:
      containers:
        - name: api
          image: 849588873172.dkr.ecr.us-east-1.amazonaws.com/martech-pipeline:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: martech-config
            - secretRef:
                name: martech-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
