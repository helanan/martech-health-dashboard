apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: martech-api-hpa
  namespace: martech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: martech-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
