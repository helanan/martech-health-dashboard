# IRSA (IAM Roles for Service Accounts) — lets the pod read from Secrets Manager
# without static AWS credentials in the cluster.
# Replace ACCOUNT_ID and OIDC_PROVIDER with your EKS cluster values.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: martech-sa
  namespace: martech
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/martech-secrets-role
